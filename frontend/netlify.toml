[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Serve index.html for all routes (SPA)
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
